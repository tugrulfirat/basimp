    function btnStyle(BRAND, disabled = false, primary = false) {
      return {
        padding: "6px 12px", borderRadius: 7, fontSize: 12, fontWeight: 600,
        cursor: disabled ? "not-allowed" : "pointer",
        border: `1px solid ${primary ? BRAND.accent : BRAND.border}`,
        background: primary ? BRAND.accent : "transparent",
        color: disabled ? BRAND.textMuted : primary ? "#fff" : BRAND.text,
        opacity: disabled ? 0.4 : 1, transition: "all 0.15s",
        display: "flex", alignItems: "center", gap: 4,
      };
    }

    function BasimpEditor() {
      const canvasRef = useRef(null);
      const overlayRef = useRef(null);
      const fileInputRef = useRef(null);
      const [image, setImage] = useState(null);
      const [imageDimensions, setImageDimensions] = useState({ w: 0, h: 0 });
      const [isFit, setIsFit] = useState(true);
      const [customZoom, setCustomZoom] = useState(100);
      const [displayZoom, setDisplayZoom] = useState(100);
      const [resizeDims, setResizeDims] = useState({ w: 0, h: 0 });
      const [aspectLock, setAspectLock] = useState(true);
      const [tool, setTool] = useState("arrow");
      const [arrowStyle, setArrowStyle] = useState("classic");
      const [isDrawing, setIsDrawing] = useState(false);
      const [startPos, setStartPos] = useState({ x: 0, y: 0 });
      const [history, setHistory] = useState([]);
      const [redactColor, setRedactColor] = useState("#000000");
      const [brushSize, setBrushSize] = useState(20);
      const [drawColor, setDrawColor] = useState("#FF4757");
      const [textInput, setTextInput] = useState("");
      const [textPos, setTextPos] = useState(null);
      const [showTextBox, setShowTextBox] = useState(false);
      const [statusMsg, setStatusMsg] = useState("Paste an image or drop a file to start");
      const [showDropZone, setShowDropZone] = useState(true);
      const [fontSize, setFontSize] = useState(24);
      const [arrowStart, setArrowStart] = useState(null);
      const [cropSelection, setCropSelection] = useState(null); // { x, y, w, h } in canvas coords
      const cropSelRef = useRef(null); // mirror of cropSelection — used inside getCropHandleAtPos
      const cropDragRef = useRef(null); // { mode, startX, startY, origCrop }
      const [socialOpen, setSocialOpen] = useState(false);
      const [activeSocial, setActiveSocial] = useState(null);
      const [saveAsOpen, setSaveAsOpen] = useState(false);
      const socialRef = useRef(null);
      const saveAsRef = useRef(null);
      const lastDrawPos = useRef(null);

      // Effect to measure actual canvas scale for the zoom slider UI
      useEffect(() => {
        if (!image || !canvasRef.current || imageDimensions.w === 0) return;
        const updateZoom = () => {
          if (isFit) {
            const rect = canvasRef.current.getBoundingClientRect();
            setDisplayZoom(Math.max(1, Math.round((rect.width / imageDimensions.w) * 100)));
          } else {
            setDisplayZoom(customZoom);
          }
        };
        const id = setTimeout(updateZoom, 10);
        const winResize = () => setTimeout(updateZoom, 10);
        if (isFit) window.addEventListener("resize", winResize);
        return () => { clearTimeout(id); window.removeEventListener("resize", winResize); };
      }, [isFit, customZoom, imageDimensions, image, tool, showTextBox, socialOpen]);

      // Global hotkeys (Enter/Esc) for Apply/Cancel
      useEffect(() => {
        const handleKeyDown = (e) => {
          if (e.key === "Enter") {
            if (tool === "resize") { e.preventDefault(); applyResize(); }
            else if (tool === "crop" && cropSelRef.current) { e.preventDefault(); applyCrop(); }
          } else if (e.key === "Escape") {
            if (tool === "resize") { e.preventDefault(); selectTool("arrow"); }
            else if (tool === "crop" && cropSelRef.current) { e.preventDefault(); cancelCrop(); }
          }
        };
        window.addEventListener("keydown", handleKeyDown);
        return () => window.removeEventListener("keydown", handleKeyDown);
      }, [tool, resizeDims, imageDimensions, aspectLock]);

      // Curated presets that look great on any screen (light & dark)
      const COLOR_PRESETS = [
        "#FF4757", // red
        "#FF6B35", // orange
        "#FFD700", // yellow
        "#2ECC71", // green
        "#00BCD4", // cyan
        "#6C63FF", // purple (brand)
        "#FF9FF3", // pink
        "#FFFFFF", // white
        "#000000", // black
      ];

      const status = (msg, duration = 2500) => {
        setStatusMsg(msg);
        if (duration) setTimeout(() => setStatusMsg(""), duration);
      };

      const saveHistory = useCallback(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const dataURL = canvas.toDataURL();
        setHistory(h => [...h.slice(-19), dataURL]);
      }, []);

      const undo = useCallback(() => {
        if (history.length === 0) return;
        const canvas = canvasRef.current;
        const ctx = canvas.getContext("2d");
        const last = history[history.length - 1];
        setHistory(h => h.slice(0, -1));
        const img = new Image();
        img.onload = () => {
          canvas.width = img.width;
          canvas.height = img.height;
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          ctx.drawImage(img, 0, 0);
          setImageDimensions({ w: img.width, h: img.height });
          setResizeDims({ w: img.width, h: img.height });
        };
        img.src = last;
        status("Undone ↩");
      }, [history]);

const loadImage = useCallback((src) => {
        const img = new Image();
        img.onload = () => {
          let w = img.width, h = img.height;
          // Native resolution preservation
          const canvas = canvasRef.current;
          canvas.width = w; canvas.height = h;
          canvas.getContext("2d").drawImage(img, 0, 0, w, h);
          setImageDimensions({ w, h });
          setResizeDims({ w, h });
          setImage(src);
          setShowDropZone(false);
          setHistory([]);
          status(`✓ Loaded ${img.width}×${img.height}px`, 3000);
        };
        img.src = src;
      }, []);

      useEffect(() => {
        const handlePaste = (e) => {
          const items = e.clipboardData?.items;
          if (!items) return;
          for (const item of items) {
            if (item.type.startsWith("image/")) {
              const blob = item.getAsFile();
              const reader = new FileReader();
              reader.onload = (ev) => loadImage(ev.target.result);
              reader.readAsDataURL(blob);
              break;
            }
          }
        };
        window.addEventListener("paste", handlePaste);
        return () => window.removeEventListener("paste", handlePaste);
      }, [loadImage]);

      useEffect(() => {
        const handleKey = (e) => {
          if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return;
          if ((e.metaKey || e.ctrlKey) && e.key === "z") { e.preventDefault(); undo(); return; }
          const t = TOOLS.find(t => t.shortcut === e.key.toUpperCase());
          if (t) setTool(t.id);
        };
        window.addEventListener("keydown", handleKey);
        return () => window.removeEventListener("keydown", handleKey);
      }, [undo]);

      const handleDrop = (e) => {
        e.preventDefault();
        const file = e.dataTransfer.files[0];
        if (file && file.type.startsWith("image/")) {
          const reader = new FileReader();
          reader.onload = (ev) => loadImage(ev.target.result);
          reader.readAsDataURL(file);
        }
      };

      const handleFileInput = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => loadImage(ev.target.result);
        reader.readAsDataURL(file);
      };

      const getPos = (e) => {
        const canvas = canvasRef.current;
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
      };

      const applyBlur = (ctx, x, y, w, h, radius = 10) => {
        for (let i = 0; i < 3; i++) {
          ctx.save();
          ctx.filter = `blur(${radius}px)`;
          const d = ctx.getImageData(x, y, w, h);
          const o = document.createElement("canvas");
          o.width = w; o.height = h;
          o.getContext("2d").putImageData(d, 0, 0);
          ctx.drawImage(o, x, y);
          ctx.restore();
        }
      };

      const applyPixelate = (ctx, x, y, w, h, blockSize = 12) => {
        const imageData = ctx.getImageData(x, y, w, h);
        const d = imageData.data;
        for (let py = 0; py < h; py += blockSize) {
          for (let px = 0; px < w; px += blockSize) {
            const i = (py * w + px) * 4;
            const r = d[i], g = d[i+1], b = d[i+2], a = d[i+3];
            for (let fy = 0; fy < blockSize && py + fy < h; fy++) {
              for (let fx = 0; fx < blockSize && px + fx < w; fx++) {
                const j = ((py + fy) * w + (px + fx)) * 4;
                d[j] = r; d[j+1] = g; d[j+2] = b; d[j+3] = a;
              }
            }
          }
        }
        ctx.putImageData(imageData, x, y);
      };

      const drawArrowOnCanvas = (ctx, x1, y1, x2, y2, color = "#FF4757", size = 3, style = "classic") => {
        const dx = x2 - x1, dy = y2 - y1;
        const angle = Math.atan2(dy, dx);
        const len = Math.sqrt(dx*dx + dy*dy);
        if (len < 5) return;
        
        ctx.save();
        ctx.strokeStyle = color; ctx.fillStyle = color;
        ctx.lineCap = "round"; ctx.lineJoin = "round";
        
        if (style === "elegant") {
          ctx.shadowColor = "rgba(0,0,0,0.25)"; ctx.shadowBlur = 6; ctx.shadowOffsetY = 2;
          ctx.lineWidth = Math.max(2, size*0.7);
          const headLen = 22 + size * 4;
          
          // Calculate a control point for a subtle sweeping curve (offset by 15% perpendicular to line)
          const cx = (x1 + x2)/2 - dy * 0.15;
          const cy = (y1 + y2)/2 + dx * 0.15;
          
          // Stop drawing the main line so it doesn't poke through the inner curve of the swept arrowhead
          // But use the angle of the end of the curve!
          const headAngle = Math.atan2(y2 - cy, x2 - cx);
