  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #0F0F1A;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
    }

    #root {
      width: 100vw;
      height: 100vh;
    }

    /* Sleek Canva-style Custom Scrollbars */
    ::-webkit-scrollbar {
      width: 14px;
      height: 14px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: #3E3E5A;
      border: 4px solid #0F0F1A;
      border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #5E5E7A;
    }

    ::-webkit-scrollbar-corner {
      background: #0F0F1A;
    }
  </style>
