        ),
        sizes: [

    function btnStyle(BRAND, disabled = false, primary = false) {
      return {
        padding: "6px 12px", borderRadius: 7, fontSize: 12, fontWeight: 600,
        cursor: disabled ? "not-allowed" : "pointer",
        border: `1px solid ${primary ? BRAND.accent : BRAND.border}`,
        background: primary ? BRAND.accent : "transparent",
        color: disabled ? BRAND.textMuted : primary ? "#fff" : BRAND.text,
        opacity: disabled ? 0.4 : 1, transition: "all 0.15s",
        display: "flex", alignItems: "center", gap: 4,
      };
    }

    function BasimpEditor() {
      const canvasRef = useRef(null);
      const overlayRef = useRef(null);
      const fileInputRef = useRef(null);
      const [image, setImage] = useState(null);
      const [imageDimensions, setImageDimensions] = useState({ w: 0, h: 0 });
      const [tool, setTool] = useState("redact");
      const [isDrawing, setIsDrawing] = useState(false);
      const [startPos, setStartPos] = useState({ x: 0, y: 0 });
      const [history, setHistory] = useState([]);
      const [redactColor, setRedactColor] = useState("#000000");
      const [brushSize, setBrushSize] = useState(20);
      const [drawColor, setDrawColor] = useState("#FF4757");
      const [textInput, setTextInput] = useState("");
      const [textPos, setTextPos] = useState(null);
      const [showTextBox, setShowTextBox] = useState(false);
      const [statusMsg, setStatusMsg] = useState("Paste an image or drop a file to start");
      const [showDropZone, setShowDropZone] = useState(true);
      const [fontSize, setFontSize] = useState(24);
      const [arrowStart, setArrowStart] = useState(null);
      const [cropSelection, setCropSelection] = useState(null); // { x, y, w, h } in canvas coords
      const [socialOpen, setSocialOpen] = useState(false);       // social platform picker open
      const [activeSocial, setActiveSocial] = useState(null);    // currently expanded platform
      const socialRef = useRef(null);
      const lastDrawPos = useRef(null);

      // Curated presets that look great on any screen (light & dark)
      const COLOR_PRESETS = [
        "#FF4757", // red
        "#FF6B35", // orange
        "#FFD700", // yellow
        "#2ECC71", // green
        "#00BCD4", // cyan
        "#6C63FF", // purple (brand)
        "#FF9FF3", // pink
        "#FFFFFF", // white
        "#000000", // black
      ];

      const status = (msg, duration = 2500) => {
        setStatusMsg(msg);
        if (duration) setTimeout(() => setStatusMsg(""), duration);
      };

      const saveHistory = useCallback(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        setHistory(h => [...h.slice(-19), canvas.toDataURL()]);
      }, []);

      const undo = useCallback(() => {
        if (history.length === 0) return;
        const canvas = canvasRef.current;
        const ctx = canvas.getContext("2d");
        const last = history[history.length - 1];
        setHistory(h => h.slice(0, -1));
        const img = new Image();
        img.onload = () => { ctx.clearRect(0, 0, canvas.width, canvas.height); ctx.drawImage(img, 0, 0); };
        img.src = last;
        status("Undone ↩");
      }, [history]);

const loadImage = useCallback((src) => {
        const img = new Image();
        img.onload = () => {
          const maxW = window.innerWidth - 300;
          const maxH = window.innerHeight - 130;
          let w = img.width, h = img.height;
          if (w > maxW) { h = h * maxW / w; w = maxW; }
          if (h > maxH) { w = w * maxH / h; h = maxH; }
          w = Math.round(w); h = Math.round(h);
          // Canvas is always in the DOM (just hidden), so canvasRef is always valid
          const canvas = canvasRef.current;
          canvas.width = w; canvas.height = h;
          canvas.getContext("2d").drawImage(img, 0, 0, w, h);
          setImageDimensions({ w, h });
          setImage(src);
          setShowDropZone(false);
          setHistory([]);
          status(`✓ Loaded ${img.width}×${img.height}px`, 3000);
        };
        img.src = src;
      }, []);

      useEffect(() => {
        const handlePaste = (e) => {
          const items = e.clipboardData?.items;
          if (!items) return;
          for (const item of items) {
            if (item.type.startsWith("image/")) {
              const blob = item.getAsFile();
              const reader = new FileReader();
              reader.onload = (ev) => loadImage(ev.target.result);
              reader.readAsDataURL(blob);
              break;
            }
          }
        };
        window.addEventListener("paste", handlePaste);
        return () => window.removeEventListener("paste", handlePaste);
      }, [loadImage]);

      useEffect(() => {
        const handleKey = (e) => {
          if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return;
          if ((e.metaKey || e.ctrlKey) && e.key === "z") { e.preventDefault(); undo(); return; }
          const t = TOOLS.find(t => t.shortcut === e.key.toUpperCase());
          if (t) setTool(t.id);
        };
        window.addEventListener("keydown", handleKey);
        return () => window.removeEventListener("keydown", handleKey);
      }, [undo]);

      const handleDrop = (e) => {
        e.preventDefault();
        const file = e.dataTransfer.files[0];
        if (file && file.type.startsWith("image/")) {
          const reader = new FileReader();
          reader.onload = (ev) => loadImage(ev.target.result);
          reader.readAsDataURL(file);
        }
      };

      const handleFileInput = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => loadImage(ev.target.result);
        reader.readAsDataURL(file);
      };

      const getPos = (e) => {
        const canvas = canvasRef.current;
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
      };

      const applyBlur = (ctx, x, y, w, h, radius = 10) => {
        for (let i = 0; i < 3; i++) {
          ctx.save();
          ctx.filter = `blur(${radius}px)`;
          const d = ctx.getImageData(x, y, w, h);
          const o = document.createElement("canvas");
          o.width = w; o.height = h;
          o.getContext("2d").putImageData(d, 0, 0);
          ctx.drawImage(o, x, y);
          ctx.restore();
        }
      };

      const applyPixelate = (ctx, x, y, w, h, blockSize = 12) => {
        const imageData = ctx.getImageData(x, y, w, h);
        const d = imageData.data;
        for (let py = 0; py < h; py += blockSize) {
          for (let px = 0; px < w; px += blockSize) {
            const i = (py * w + px) * 4;
            const r = d[i], g = d[i+1], b = d[i+2], a = d[i+3];
            for (let fy = 0; fy < blockSize && py + fy < h; fy++) {
              for (let fx = 0; fx < blockSize && px + fx < w; fx++) {
                const j = ((py + fy) * w + (px + fx)) * 4;
                d[j] = r; d[j+1] = g; d[j+2] = b; d[j+3] = a;
              }
            }
          }
        }
        ctx.putImageData(imageData, x, y);
      };

      const drawArrowOnCanvas = (ctx, x1, y1, x2, y2, color = "#FF4757", size = 3) => {
        const angle = Math.atan2(y2 - y1, x2 - x1);
        const headLen = 18 + size * 3;
        ctx.save();
        ctx.strokeStyle = color; ctx.fillStyle = color;
        ctx.lineWidth = size + 1; ctx.lineCap = "round";
        ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(x2, y2);
        ctx.lineTo(x2 - headLen * Math.cos(angle - Math.PI/7), y2 - headLen * Math.sin(angle - Math.PI/7));
        ctx.lineTo(x2 - headLen * Math.cos(angle + Math.PI/7), y2 - headLen * Math.sin(angle + Math.PI/7));
        ctx.closePath(); ctx.fill();
        ctx.restore();
      };

      const handleMouseDown = (e) => {
        if (!image) return;
        const pos = getPos(e);
        if (tool === "text") { setTextPos(pos); setShowTextBox(true); return; }
        if (tool === "arrow") { setArrowStart(pos); setIsDrawing(true); return; }
        saveHistory();
        setIsDrawing(true); setStartPos(pos); lastDrawPos.current = pos;
        if (tool === "draw") {
          const ctx = canvasRef.current.getContext("2d");
          ctx.beginPath(); ctx.arc(pos.x, pos.y, brushSize/2, 0, Math.PI*2);
          ctx.fillStyle = drawColor; ctx.fill();
        }
      };

      const handleMouseMove = (e) => {
        if (!isDrawing || !image) return;
        const pos = getPos(e);
        if (tool === "draw") {
          const ctx = canvasRef.current.getContext("2d");
          ctx.beginPath(); ctx.moveTo(lastDrawPos.current.x, lastDrawPos.current.y);
          ctx.lineTo(pos.x, pos.y);
          ctx.strokeStyle = drawColor; ctx.lineWidth = brushSize;
          ctx.lineCap = "round"; ctx.lineJoin = "round"; ctx.stroke();
          lastDrawPos.current = pos;
        }
        // Selection overlay
        if (["redact","blur","pixelate","crop"].includes(tool) && overlayRef.current) {
          const canvas = canvasRef.current;
          const rect = canvas.getBoundingClientRect();
          const scaleX = rect.width / canvas.width;
          const scaleY = rect.height / canvas.height;
          const x = Math.min(startPos.x, getPos(e).x);
          const y = Math.min(startPos.y, getPos(e).y);
          const w = Math.abs(getPos(e).x - startPos.x);
          const h = Math.abs(getPos(e).y - startPos.y);
          const canvasRect = canvas.getBoundingClientRect();
          const containerRect = canvas.parentElement.getBoundingClientRect();
          overlayRef.current.style.left = (x * scaleX + canvasRect.left - containerRect.left) + "px";
          overlayRef.current.style.top = (y * scaleY + canvasRect.top - containerRect.top) + "px";
          overlayRef.current.style.width = (w * scaleX) + "px";
          overlayRef.current.style.height = (h * scaleY) + "px";
          overlayRef.current.style.display = "block";
        }
      };

      const handleMouseUp = (e) => {
        if (!isDrawing || !image) { setIsDrawing(false); return; }
        if (overlayRef.current) overlayRef.current.style.display = "none";
        const pos = getPos(e);
        const canvas = canvasRef.current;
        const ctx = canvas.getContext("2d");

        if (tool === "arrow" && arrowStart) {
          saveHistory();
          drawArrowOnCanvas(ctx, arrowStart.x, arrowStart.y, pos.x, pos.y, drawColor, brushSize/8+2);
          setArrowStart(null);

                  React.createElement("div", { key: c, onClick: () => setDrawColor(c), style: { width: 22, height: 22, borderRadius: 5, background: c, border: drawColor === c ? `2px solid white` : c === "#FFFFFF" ? `1px solid ${BRAND.border}` : "1px solid transparent", cursor: "pointer", transition: "transform 0.1s", transform: drawColor === c ? "scale(1.2)" : "scale(1)" } })
                )
              ),
              React.createElement("input", { type: "color", value: drawColor, onChange: e => setDrawColor(e.target.value), style: { width: "100%", height: 28, borderRadius: 6, border: `1px solid ${BRAND.border}`, cursor: "pointer" } })
            ),

            React.createElement("div", { style: { marginTop: "auto", paddingTop: 16, borderTop: `1px solid ${BRAND.border}` } },
              React.createElement("div", { style: { fontSize: 11, color: BRAND.textMuted, letterSpacing: 1, textTransform: "uppercase", marginBottom: 8 } }, "Canvas"),
              React.createElement("div", { style: { fontSize: 12, color: BRAND.textMuted } }, `${imageDimensions.w} × ${imageDimensions.h}px`),
              React.createElement("div", { style: { fontSize: 12, color: BRAND.textMuted, marginTop: 4 } }, `${history.length} edit${history.length !== 1 ? "s" : ""}`)
            ),

            React.createElement("div", { style: { display: "flex", flexDirection: "column", gap: 8 } },
              React.createElement("button", { onClick: copyToClipboard, style: { ...btnStyle(BRAND), width: "100%", justifyContent: "center" } }, "📋 Copy to Clipboard"),
              React.createElement("button", { onClick: () => exportImage("png"), style: { ...btnStyle(BRAND, false, true), width: "100%", justifyContent: "center" } }, "⬇ Export PNG"),
              React.createElement("button", { onClick: () => exportImage("jpg"), style: { ...btnStyle(BRAND), width: "100%", justifyContent: "center" } }, "⬇ Export JPG")
            )
          )
        ),

        // Bottom bar
        React.createElement("div", { style: { height: 28, background: BRAND.surface, borderTop: `1px solid ${BRAND.border}`, display: "flex", alignItems: "center", justifyContent: "space-between", padding: "0 16px", fontSize: 11, color: BRAND.textMuted, flexShrink: 0 } },
          React.createElement("span", null, "basimp.com — Basic Image Manipulator"),
          React.createElement("span", null, "Ctrl+Z undo  ·  V select  ·  R redact  ·  B blur  ·  P pixelate  ·  C crop  ·  A arrow  ·  T text  ·  D draw")
        )
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(React.createElement(BasimpEditor));
  </script>
</body>
</html>
