<svg width="200" height="48" viewBox="0 0 200 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Icon mark: stylized "b" inside a rounded square, inspired by modern tool apps -->
  <rect width="48" height="48" rx="12" fill="#1A1A2E"/>
  <!-- Subtle grid dots like Photopea/Figma canvas feel -->
  <circle cx="14" cy="14" r="1.5" fill="#3A3A5C"/>
  <circle cx="24" cy="14" r="1.5" fill="#3A3A5C"/>
  <circle cx="34" cy="14" r="1.5" fill="#3A3A5C"/>
  <circle cx="14" cy="24" r="1.5" fill="#3A3A5C"/>
  <circle cx="34" cy="24" r="1.5" fill="#3A3A5C"/>
  <circle cx="14" cy="34" r="1.5" fill="#3A3A5C"/>
  <circle cx="24" cy="34" r="1.5" fill="#3A3A5C"/>
  <circle cx="34" cy="34" r="1.5" fill="#3A3A5C"/>
  <!-- "b" lettermark in accent color -->
  <text x="13" y="34" font-family="'Georgia', serif" font-size="26" font-weight="700" fill="#6C63FF">b</text>
  <!-- Wordmark -->
  <text x="60" y="32" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="22" font-weight="700" letter-spacing="-0.5" fill="#1A1A2E">bas<tspan fill="#6C63FF">imp</tspan></text>
</svg>
